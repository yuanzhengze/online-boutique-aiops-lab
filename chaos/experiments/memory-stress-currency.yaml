apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: memory-stress-currency
  namespace: chaos-mesh
spec:
  mode: one
  selector:
    namespaces:
      - default
    labelSelectors:
      app: currencyservice
  stressors:
    memory:
      workers: 2
      size: "256MB"
  duration: "120s"
