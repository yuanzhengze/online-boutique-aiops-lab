# 渐进式丢包 - frontend 10%
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: progressive-loss-frontend-10
  namespace: chaos-mesh
spec:
  action: loss
  mode: one
  selector:
    namespaces:
      - default
    labelSelectors:
      app: frontend
  loss:
    loss: "10"
    correlation: "50"
  duration: "120s"
