apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: cpu-stress-productcatalog
  namespace: chaos-mesh
spec:
  mode: one
  selector:
    namespaces:
      - default
    labelSelectors:
      app: productcatalogservice
  stressors:
    cpu:
      workers: 2
      load: 80
  duration: "120s"
