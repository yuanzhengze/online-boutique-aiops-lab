apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: network-delay-cartservice
  namespace: chaos-mesh
spec:
  action: delay
  mode: one
  selector:
    namespaces:
      - default
    labelSelectors:
      app: cartservice
  delay:
    latency: "500ms"
    correlation: "50"
    jitter: "100ms"
  duration: "120s"
