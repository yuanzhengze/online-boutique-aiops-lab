# 渐进式延迟 - recommendationservice 200ms
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: progressive-delay-recommendation-200
  namespace: chaos-mesh
spec:
  action: delay
  mode: one
  selector:
    namespaces:
      - default
    labelSelectors:
      app: recommendationservice
  delay:
    latency: "200ms"
    correlation: "50"
    jitter: "50ms"
  duration: "120s"
