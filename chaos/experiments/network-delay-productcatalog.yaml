apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: network-delay-productcatalog
  namespace: chaos-mesh
spec:
  action: delay
  mode: one
  selector:
    namespaces:
      - default
    labelSelectors:
      app: productcatalogservice
  delay:
    latency: "800ms"
    correlation: "50"
    jitter: "200ms"
  duration: "120s"
