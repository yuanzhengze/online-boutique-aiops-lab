# TimeChaos: 对checkoutservice注入时钟偏移
# 模拟结算服务时钟快5秒，可能导致订单时间戳错误
apiVersion: chaos-mesh.org/v1alpha1
kind: TimeChaos
metadata:
  name: time-skew-checkout
  namespace: chaos-mesh
spec:
  mode: one
  selector:
    namespaces:
      - default
    labelSelectors:
      app: checkoutservice
  timeOffset: "5s"
  clockIds:
    - CLOCK_REALTIME
  duration: "120s"
