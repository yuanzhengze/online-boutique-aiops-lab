apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: network-delay-shippingservice
  namespace: chaos-mesh
spec:
  action: delay
  mode: one
  selector:
    namespaces:
      - default
    labelSelectors:
      app: shippingservice
  delay:
    latency: "600ms"
    correlation: "50"
    jitter: "150ms"
  duration: "120s"
