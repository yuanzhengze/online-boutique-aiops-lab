# Prometheus 配置文件
# 用于抓取 Online Boutique 微服务指标

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # ============================================
  # Online Boutique 各微服务
  # ============================================

  - job_name: "frontend"
    static_configs:
      - targets: ["frontend:8080"]

  - job_name: "cartservice"
    static_configs:
      - targets: ["cartservice:7070"]

  - job_name: "productcatalogservice"
    static_configs:
      - targets: ["productcatalogservice:3550"]

  - job_name: "currencyservice"
    static_configs:
      - targets: ["currencyservice:7000"]

  - job_name: "paymentservice"
    static_configs:
      - targets: ["paymentservice:50051"]

  - job_name: "shippingservice"
    static_configs:
      - targets: ["shippingservice:50050"]

  - job_name: "emailservice"
    static_configs:
      - targets: ["emailservice:5000"]

  - job_name: "checkoutservice"
    static_configs:
      - targets: ["checkoutservice:5050"]

  - job_name: "recommendationservice"
    static_configs:
      - targets: ["recommendationservice:8080"]

  - job_name: "adservice"
    static_configs:
      - targets: ["adservice:9555"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis-cart:6379"]
